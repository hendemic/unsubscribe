name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: unsubscribe-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: unsubscribe-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: unsubscribe-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: cargo build --release --target ${{ matrix.target }} -p unsubscribe-cli

      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/unsubscribe ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Generate checksum
        run: |
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          else
            shasum -a 256 ${{ matrix.asset }} > ${{ matrix.asset }}.sha256
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: unsubscribe-*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
